name: Auto Generate Sitemap & All Engine Ping

on:
  push:
    branches:
      - main
    paths:
      - '**.html'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Run sitemap generator
        run: python generate_sitemap.py

      - name: Commit and push if changed
        run: |
          git config --global user.name "SEO Bot"
          git config --global user.email "bot@github.com"
          git add sitemap.xml
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update sitemap" && git push)
      
      # 1. 向 Google 发送通知 (虽然Google取消了ping，但curl仍然有用做日志)
      - name: Ping Google
        run: curl "https://www.google.com/ping?sitemap=https://www.333555.tech/sitemap.xml"

      # 2. 向 Bing / IndexNow 发送自动提交通知 (核心)
      # 替换下面的 key 为你刚才创建的那个文件名/字符
      - name: Ping IndexNow (Bing/DuckDuckGo)
        run: |
          curl "https://www.bing.com/indexnow?url=https://www.333555.tech/sitemap.xml&key=333555techindexnowkey1234567890"
