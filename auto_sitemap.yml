name: Auto Generate Sitemap & SEO Ping

on:
  push:
    branches:
      - main
    paths:
      - '**.html' # 当你修改任何网页时触发
  workflow_dispatch: # 允许你手动点按钮运行

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Run sitemap generator
        run: python generate_sitemap.py

      - name: Commit and push if changed
        run: |
          git config --global user.name "Sitemap Bot"
          git config --global user.email "bot@github.com"
          git add sitemap.xml
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update sitemap" && git push)
      
      - name: Ping All Search Engines
        run: |
          curl "https://www.google.com/ping?sitemap=https://www.333555.tech/sitemap.xml"
          curl "https://www.bing.com/ping?sitemap=https://www.333555.tech/sitemap.xml"
