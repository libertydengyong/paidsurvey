name: Auto Generate Sitemap

on:
  push:
    branches:
      - main  # 只有当你向主分支提交代码时触发
    paths:
      - '**.html' # 只有当你增加或修改 HTML 文件时触发

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Run sitemap generator
        run: python generate_sitemap.py

      - name: Commit and push if changed
        run: |
          git config --global user.name "Sitemap Bot"
          git config --global user.email "bot@github.com"
          git add sitemap.xml
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update sitemap" && git push)
      
      - name: Ping Google
        run: curl "https://www.google.com/ping?sitemap=https://www.333555.tech/sitemap.xml"
